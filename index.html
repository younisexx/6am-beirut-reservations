<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6AM IN BEIRUT - Reservation System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --surface-0: #ffffff;
            --surface-1: #f9fafb;
            --surface-2: #f3f4f6;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --surface-0: #111827;
                --surface-1: #1f2937;
                --surface-2: #374151;
                --text-primary: #f3f4f6;
                --text-secondary: #d1d5db;
                --border: #4b5563;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--surface-0);
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sync-status {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1000;
        }

        .sync-status.synced {
            background: #d1fae5;
            color: #065f46;
        }

        .sync-status.syncing {
            background: #fef3c7;
            color: #92400e;
        }

        .sync-status.error {
            background: #fee2e2;
            color: #7f1d1d;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .sync-status.synced .sync-dot { background: #10b981; }
        .sync-status.syncing .sync-dot { background: #f59e0b; animation: pulse 1s infinite; }
        .sync-status.error .sync-dot { background: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 10px 14px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .floor-plan {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .floor-plan { grid-template-columns: 1fr; }
        }

        .stage {
            background: var(--surface-1);
            border-radius: 8px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .stage h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .section {
            margin-bottom: 16px;
        }

        .section-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(45px, 1fr));
            gap: 5px;
        }

        .table {
            aspect-ratio: 1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 600;
            border: 1px solid var(--border);
            cursor: pointer;
            position: relative;
        }

        .table.free {
            background: var(--surface-2);
            color: var(--text-secondary);
        }

        .table.booked {
            color: white;
            font-weight: 700;
        }

        .table-tooltip {
            position: absolute;
            background: var(--surface-0);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            z-index: 20;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 4px;
            opacity: 0;
            pointer-events: none;
        }

        .table:hover .table-tooltip { opacity: 1; }

        .input-section {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .input-group {
            display: grid;
            gap: 6px;
            margin-bottom: 12px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
        }

        .input-group input,
        .input-group select {
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            background: var(--surface-0);
            color: var(--text-primary);
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface-0);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        button.primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        button.danger {
            background: #fee2e2;
            color: #dc2626;
        }

        .reservation-item {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .reservation-details {
            flex: 1;
            min-width: 0;
        }

        .reservation-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 2px;
        }

        .reservation-info {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .query-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            background: var(--surface-0);
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .query-result {
            background: #d1fae5;
            border-left: 3px solid var(--success);
            color: #065f46;
            padding: 10px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }

        @media (max-width: 640px) {
            .container { padding: 12px; }
            h1 { font-size: 18px; }
            header { margin-bottom: 16px; padding: 12px 0; }
            .sync-status { top: 8px; right: 8px; }
            .tabs { gap: 2px; }
            .tab-btn { padding: 8px 10px; font-size: 11px; flex: 1; }
            .tab-text { display: none; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            button { flex: 1; }
        }
    </style>
</head>
<body>
    <div class="sync-status synced" id="syncStatus">
        <span class="sync-dot"></span>
        <span id="syncText">Synced</span>
    </div>

    <div class="container">
        <header>
            <h1>🎉 6AM IN BEIRUT</h1>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Floor</button>
            <button class="tab-btn" onclick="switchTab('input')">➕ Book</button>
            <button class="tab-btn" onclick="switchTab('list')">📋 List</button>
            <button class="tab-btn" onclick="switchTab('promoters')">👥 Stats</button>
            <button class="tab-btn" onclick="switchTab('query')">🔍 Query</button>
        </div>

        <div id="dashboard" class="tab-content active">
            <div class="stats" id="stats"></div>
            <div class="floor-plan">
                <div>
                    <div class="stage">
                        <h3>🎤 FRONT (90)</h3>
                        <div id="frontStage"></div>
                    </div>
                </div>
                <div>
                    <div class="stage">
                        <h3>🎙️ BACK (38)</h3>
                        <div id="backstage"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="input" class="tab-content">
            <div class="input-section">
                <h2 style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">New Reservation</h2>
                <div class="input-group">
                    <label>Promoter</label>
                    <select id="inputName"><option value="">Select</option></select>
                </div>
                <div class="input-group">
                    <label>Guests</label>
                    <input type="number" id="inputGuests" min="1">
                </div>
                <div class="input-group">
                    <label>Phone</label>
                    <input type="tel" id="inputPhone">
                </div>
                <div class="input-group">
                    <label>Section</label>
                    <select id="inputSection">
                        <option value="">Select</option>
                        <optgroup label="Front">
                            <option value="BLUE">BLUE (4)</option>
                            <option value="CYAN">CYAN (4)</option>
                            <option value="GREEN">GREEN (12)</option>
                            <option value="PINK">PINK (14)</option>
                            <option value="YELLOW">YELLOW (14)</option>
                            <option value="GREY">GREY (16)</option>
                            <option value="RED">RED (14)</option>
                            <option value="BURGUNDY">BURGUNDY (12)</option>
                        </optgroup>
                        <optgroup label="Back">
                            <option value="BLACK">BLACK (6)</option>
                            <option value="NAVY">NAVY (4)</option>
                            <option value="TURQUOISE">TURQUOISE (11)</option>
                            <option value="ORANGE">ORANGE (15)</option>
                            <option value="GREEN_BACK">GREEN (2)</option>
                        </optgroup>
                    </select>
                </div>
                <div class="input-group">
                    <label>Age (optional)</label>
                    <input type="text" id="inputAge">
                </div>
                <div class="button-group">
                    <button class="primary" onclick="addReservation()" style="flex: 1;">✓ Add</button>
                    <button onclick="clearForm()">Clear</button>
                </div>
            </div>

            <div class="input-section">
                <h2 style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">New Promoter</h2>
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="newPromoter">
                </div>
                <div class="button-group">
                    <button class="primary" onclick="addPromoter()" style="flex: 1;">✓ Add</button>
                </div>
            </div>
        </div>

        <div id="list" class="tab-content">
            <input type="text" id="filterPromoter" placeholder="Filter..." style="width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 6px;">
            <div id="reservationList"></div>
        </div>

        <div id="promoters" class="tab-content">
            <div id="promotersStats"></div>
        </div>

        <div id="query" class="tab-content">
            <input type="text" id="queryInput" class="query-input" placeholder="e.g., 'How many RED?' or 'Ahmed tables?'" onkeypress="if(event.key==='Enter') runQuery()">
            <button class="primary" onclick="runQuery()" style="width: 100%;">🔍 Search</button>
            <div id="queryResult"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNO0w6F3RhVG3d4FgWwUYV5wRjvziTrRMC2IHLTu5fVW5KJmbqekq1mCY6I-BJ3K94/exec';

        const colors = {
            'BLACK': '#1a1a1a', 'NAVY': '#001f5c', 'TURQUOISE': '#20b2aa', 'ORANGE': '#ff8c00',
            'BLUE': '#0066cc', 'CYAN': '#00bfff', 'GREEN': '#228b22', 'PINK': '#ff1493',
            'YELLOW': '#ffd700', 'GREY': '#808080', 'RED': '#dc143c', 'BURGUNDY': '#800020'
        };

        const sections = {
            'FRONT': { 'BLUE': 4, 'CYAN': 4, 'GREEN': 12, 'PINK': 14, 'YELLOW': 14, 'GREY': 16, 'RED': 14, 'BURGUNDY': 12 },
            'BACK': { 'BLACK': 6, 'NAVY': 4, 'TURQUOISE': 11, 'ORANGE': 15, 'GREEN': 2 }
        };

        let reservations = [];
        let tableStatus = {};
        let promoters = [];

        function setSyncStatus(status, msg) {
            document.getElementById('syncStatus').className = 'sync-status ' + status;
            document.getElementById('syncText').textContent = msg;
        }

        async function fetchData() {
            try {
                setSyncStatus('syncing', 'Syncing...');
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                reservations = [];
                for (let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if (row[0]) {
                        reservations.push({
                            name: row[0],
                            guests: parseInt(row[1]) || 0,
                            phone: row[2] || '',
                            section: row[3] || '',
                            stage: row[4] || 'FRONT',
                            tables: parseInt(row[5]) || 0,
                            age: row[6] || '',
                            date: row[7] || ''
                        });
                    }
                }

                applyReservations();
                render();
                setSyncStatus('synced', 'Synced');
            } catch (e) {
                console.error(e);
                setSyncStatus('error', 'Failed');
            }
        }

        async function saveToSheet(data) {
            try {
                setSyncStatus('syncing', 'Saving...');
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                await new Promise(r => setTimeout(r, 500));
                await fetchData();
            } catch (e) {
                console.error(e);
                setSyncStatus('error', 'Failed');
            }
        }

        function init() {
            Object.entries(sections.FRONT).forEach(([color, count]) => {
                for (let i = 1; i <= count; i++) {
                    tableStatus[`FRONT_${color}_${i}`] = {color, booked: false, promoter: null, stage: 'FRONT'};
                }
            });
            Object.entries(sections.BACK).forEach(([color, count]) => {
                for (let i = 1; i <= count; i++) {
                    tableStatus[`BACK_${color}_${i}`] = {color, booked: false, promoter: null, stage: 'BACK'};
                }
            });

            const saved = localStorage.getItem('promoters');
            if (saved) promoters = JSON.parse(saved);

            fetchData();
            setInterval(fetchData, 2000);
            document.getElementById('filterPromoter').addEventListener('input', renderList);
        }

        function applyReservations() {
            Object.keys(tableStatus).forEach(id => {
                tableStatus[id].booked = false;
                tableStatus[id].promoter = null;
            });

            reservations.forEach(res => {
                let booked = 0;
                for (let id in tableStatus) {
                    if (booked >= res.tables) break;
                    const t = tableStatus[id];
                    if (t.color === res.section && !t.booked && t.stage === res.stage) {
                        t.booked = true;
                        t.promoter = res.name;
                        booked++;
                    }
                }
            });
        }

        function render() {
            renderStats();
            renderFloorPlan();
            renderList();
            renderPromoters();
            updatePromoterSelect();
        }

        function renderStats() {
            const total = Object.keys(tableStatus).length;
            const booked = Object.values(tableStatus).filter(t => t.booked).length;
            const free = total - booked;
            const occ = ((booked / total) * 100).toFixed(1);

            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
                <div class="stat-card"><div class="stat-label">Booked</div><div class="stat-value" style="color: var(--success);">${booked}</div></div>
                <div class="stat-card"><div class="stat-label">Free</div><div class="stat-value" style="color: var(--primary);">${free}</div></div>
                <div class="stat-card"><div class="stat-label">Occupancy</div><div class="stat-value">${occ}%</div></div>
            `;
        }

        function renderFloorPlan() {
            const front = Object.entries(sections.FRONT).map(([color, count]) => {
                const tables = Array.from({length: count}, (_, i) => {
                    const id = `FRONT_${color}_${i+1}`;
                    const t = tableStatus[id];
                    return `<div class="table ${t.booked ? 'booked' : 'free'}" style="background: ${t.booked ? colors[color] : 'var(--surface-2)'}; color: ${t.booked ? 'white' : 'var(--text-secondary)'};">
                        ${t.booked ? t.promoter?.substring(0, 2).toUpperCase() : color.substring(0, 2)}
                        <div class="table-tooltip">${id.replace('FRONT_', '')}${t.booked ? ` - ${t.promoter}` : ''}</div>
                    </div>`;
                }).join('');
                return `<div class="section"><div class="section-name">${color}</div><div class="tables-grid">${tables}</div></div>`;
            }).join('');
            document.getElementById('frontStage').innerHTML = front;

            const back = Object.entries(sections.BACK).map(([color, count]) => {
                const tables = Array.from({length: count}, (_, i) => {
                    const id = `BACK_${color}_${i+1}`;
                    const t = tableStatus[id];
                    return `<div class="table ${t.booked ? 'booked' : 'free'}" style="background: ${t.booked ? colors[color] : 'var(--surface-2)'}; color: ${t.booked ? 'white' : 'var(--text-secondary)'};">
                        ${t.booked ? t.promoter?.substring(0, 2).toUpperCase() : color.substring(0, 2)}
                        <div class="table-tooltip">${id.replace('BACK_', '')}${t.booked ? ` - ${t.promoter}` : ''}</div>
                    </div>`;
                }).join('');
                return `<div class="section"><div class="section-name">${color}</div><div class="tables-grid">${tables}</div></div>`;
            }).join('');
            document.getElementById('backstage').innerHTML = back;
        }

        function renderList() {
            const filter = document.getElementById('filterPromoter').value.toLowerCase();
            const filtered = reservations.filter(r => r.name.toLowerCase().includes(filter));

            if (!filtered.length) {
                document.getElementById('reservationList').innerHTML = '<div class="empty-state">No reservations</div>';
                return;
            }

            document.getElementById('reservationList').innerHTML = filtered.map((r, i) => `
                <div class="reservation-item">
                    <div class="reservation-details">
                        <div class="reservation-name">${r.name}</div>
                        <div class="reservation-info">📱 ${r.phone} | 👥 ${r.guests} | ${r.section} (${r.stage}) | ${r.tables} table(s)</div>
                    </div>
                    <button class="danger" onclick="deleteRes(${reservations.indexOf(r)})">Delete</button>
                </div>
            `).join('');
        }

        function renderPromoters() {
            const stats = {};
            Object.entries(tableStatus).forEach(([_, t]) => {
                if (t.booked && t.promoter) {
                    if (!stats[t.promoter]) stats[t.promoter] = {total: 0, byColor: {}};
                    stats[t.promoter].total++;
                    stats[t.promoter].byColor[t.color] = (stats[t.promoter].byColor[t.color] || 0) + 1;
                }
            });

            if (!Object.keys(stats).length) {
                document.getElementById('promotersStats').innerHTML = '<div class="empty-state">No promoters</div>';
                return;
            }

            document.getElementById('promotersStats').innerHTML = Object.entries(stats)
                .sort((a, b) => b[1].total - a[1].total)
                .map(([promo, data]) => `
                    <div style="background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <h3 style="font-size: 13px; font-weight: 600;">${promo}</h3>
                            <span style="font-size: 18px; font-weight: 700; color: var(--primary);">${data.total}</span>
                        </div>
                        ${Object.entries(data.byColor).sort((a, b) => b[1] - a[1]).map(([color, count]) => `
                            <div style="font-size: 11px; color: var(--text-secondary);">
                                <span style="display: inline-block; width: 10px; height: 10px; border-radius: 2px; background: ${colors[color]}; margin-right: 6px; vertical-align: middle;"></span>
                                ${color}: ${count}
                            </div>
                        `).join('')}
                    </div>
                `).join('');
        }

        function updatePromoterSelect() {
            const sel = document.getElementById('inputName');
            const curr = sel.value;
            sel.innerHTML = '<option value="">Select</option>' + promoters.map(p => `<option value="${p}">${p}</option>`).join('');
            sel.value = curr;
        }

        async function addReservation() {
            const name = document.getElementById('inputName').value.trim();
            const guests = parseInt(document.getElementById('inputGuests').value) || 0;
            const phone = document.getElementById('inputPhone').value.trim();
            const section = document.getElementById('inputSection').value;
            const age = document.getElementById('inputAge').value.trim();

            if (!name || !guests || !section) { alert('Fill all fields!'); return; }

            const stage = ['BLACK', 'NAVY', 'TURQUOISE', 'ORANGE', 'GREEN_BACK'].includes(section) ? 'BACK' : 'FRONT';
            const sec = section === 'GREEN_BACK' ? 'GREEN' : section;
            const numTables = Math.ceil(guests / 15);

            await saveToSheet({
                action: 'addReservation',
                name, guests, phone, section: sec, stage, tables: numTables, age
            });

            clearForm();
            alert(`✓ ${numTables} table(s) for ${name}!`);
            switchTab('dashboard');
        }

        function addPromoter() {
            const name = document.getElementById('newPromoter').value.trim();
            if (!name || promoters.includes(name)) { alert('Invalid!'); return; }
            promoters.push(name);
            promoters.sort();
            localStorage.setItem('promoters', JSON.stringify(promoters));
            document.getElementById('newPromoter').value = '';
            updatePromoterSelect();
            alert(`✓ ${name} added!`);
        }

        function deleteRes(idx) {
            if (confirm('Delete?')) {
                reservations.splice(idx, 1);
                renderList();
            }
        }

        function clearForm() {
            document.getElementById('inputName').value = '';
            document.getElementById('inputGuests').value = '';
            document.getElementById('inputPhone').value = '';
            document.getElementById('inputSection').value = '';
            document.getElementById('inputAge').value = '';
        }

        function runQuery() {
            const q = document.getElementById('queryInput').value.toLowerCase();
            const res = document.getElementById('queryResult');
            if (!q) { res.innerHTML = ''; return; }

            let result = '';
            if (q.includes('how many') || q.includes('combien')) {
                for (let color of Object.keys(colors)) {
                    if (q.includes(color.toLowerCase())) {
                        const booked = Object.values(tableStatus).filter(t => t.color === color && t.booked).length;
                        const total = Object.values(tableStatus).filter(t => t.color === color).length;
                        result = `${color}: ${booked}/${total} booked`;
                        break;
                    }
                }
                if (!result) {
                    const booked = Object.values(tableStatus).filter(t => t.booked).length;
                    result = `Total: ${booked}/${Object.keys(tableStatus).length} booked`;
                }
            } else {
                const found = reservations.find(r => r.name.toLowerCase().includes(q.split(' ')[0]));
                result = found ? `${found.name}: ${found.tables} table(s) in ${found.section}` : 'Not found';
            }

            res.innerHTML = `<div class="query-result">${result}</div>`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        init();
    </script>
</body>
</html>
